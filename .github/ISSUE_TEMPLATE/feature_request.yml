name: Feature request
description: Propose a Contract Kit capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Start with the user problem and desired outcome. A proposed implementation is welcome, but it should not substitute for the problem statement.

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - conkit CLI
        - Signature contracts
        - Sketch contracts
        - Contract format
        - CI, releases, or documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Who encounters the problem, and what can they not do today?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable behavior and success criteria.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Describe a command, API, format, or workflow if you have one in mind.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include current workarounds and why they are insufficient.

  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility considerations
      options:
        - label: This may change the public Rust API.
        - label: This may change CLI grammar or output.
        - label: This may change the contract format or persistence behavior.
        - label: This may behave differently across Windows, Linux, and macOS.

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched the existing issues and discussions for this request.
          required: true
