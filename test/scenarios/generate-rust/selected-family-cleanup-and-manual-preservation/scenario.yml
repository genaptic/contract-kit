version: 1
coverage:
- behavior.generate.preserve.sketches-when-signatures-selected
- behavior.generate.preserve.signatures-when-sketches-selected
- behavior.generate.manual-file-preserved
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --crate-root
  - scenario=library:nested/lib.rs
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        signature generation completed: documents 1, signatures 3, preserved sketches 0, semantically changed documents 1, byte-changed documents 1
    stderr:
      kind: empty
- type: overlay
  source: assets/linked/main.yml
  destination: /output/contracts/main.yml
- type: overlay
  source: assets/linked/generated-files.json
  destination: /output/contracts/.contract-kit/generated-files.json
- type: run
  argv:
  - conkit
  - generate
  - sketches
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        sketch generation completed: linked 2, refreshed 2, changed 2, changed documents 1
    stderr:
      kind: empty
- type: overlay
  source: assets/overlays/manual/manual.txt
  destination: /output/contracts/manual.txt
- type: overlay
  source: assets/overlays/body-only/lib.rs
  destination: /input/source/nested/lib.rs
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        signature generation completed: documents 1, signatures 3, preserved sketches 2, semantically changed documents 0, byte-changed documents 0
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output/after-signatures
  contents: text
- type: run
  argv:
  - conkit
  - generate
  - sketches
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        sketch generation completed: linked 2, refreshed 2, changed 1, changed documents 1
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output/after-sketches
  contents: text
- type: overlay
  source: assets/overlays/lifecycle/extra.rs
  destination: /input/source/nested/extra.rs
- type: overlay
  source: assets/overlays/lifecycle/lib.rs
  destination: /input/source/nested/lib.rs
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        failed to generate signature contracts

        Caused by:
            failed to convert signatures: removing signature extra_function would orphan preserved sketch extra_body
- type: assert_tree
  actual: /output/contracts
  expected: output/after-sketches
  contents: text
- type: run
  argv:
  - conkit
  - generate
  - all
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract generation completed: documents 1, signatures 2, preserved sketches 1, semantically changed documents 1, byte-changed documents 1; linked sketches 1, refreshed 1, changed 1, changed documents 1
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output/after-all-cleanup
  contents: text
