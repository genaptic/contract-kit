version: 1
coverage:
- behavior.generate.deterministic.signatures
- behavior.generate.deterministic.sketches
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --crate-root
  - scenario=library:nested/lib.rs
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        signature generation completed: documents 1, signatures 3, preserved sketches 0, semantically changed documents 1, byte-changed documents 1
    stderr:
      kind: empty
- type: overlay
  source: assets/linked/main.yml
  destination: /output/contracts/main.yml
- type: overlay
  source: assets/linked/generated-files.json
  destination: /output/contracts/.contract-kit/generated-files.json
- type: run
  argv:
  - conkit
  - generate
  - all
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract generation completed: documents 1, signatures 3, preserved sketches 1, semantically changed documents 0, byte-changed documents 0; linked sketches 1, refreshed 1, changed 1, changed documents 1
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output/generation-2
  contents: bytes
- type: run
  argv:
  - conkit
  - generate
  - all
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract generation completed: documents 1, signatures 3, preserved sketches 1, semantically changed documents 0, byte-changed documents 0; linked sketches 1, refreshed 1, changed 0, changed documents 0
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output/generation-3
  contents: bytes
