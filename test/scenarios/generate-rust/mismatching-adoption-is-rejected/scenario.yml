version: 1
coverage:
- behavior.generate.adoption.mismatching-rejected
steps:
- type: run
  argv:
  - conkit
  - generate
  - all
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --crate-root
  - scenario=library:nested/lib.rs
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract generation completed: documents 1, signatures 3, preserved sketches 0, semantically changed documents 1, byte-changed documents 1; linked sketches 0, refreshed 0, changed 0, changed documents 0
    stderr:
      kind: empty
- type: remove
  path: /output/contracts/.contract-kit
- type: overlay
  source: assets/overlays/modified/main.yml
  destination: /output/contracts/main.yml
- type: run
  argv:
  - conkit
  - generate
  - all
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --adopt-existing
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        refusing to overwrite unowned generated output: /output/contracts/main.yml
- type: assert_tree
  actual: /output/contracts
  expected: output
  contents: text
