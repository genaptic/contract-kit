version: 1
coverage:
- behavior.generate.error.non-utf8-sketch-source
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --crate-root
  - scenario=library:nested/lib.rs
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        signature generation completed: documents 1, signatures 3, preserved sketches 0, semantically changed documents 1, byte-changed documents 1
    stderr:
      kind: empty
- type: overlay
  source: assets/linked/main.yml
  destination: /output/contracts/main.yml
- type: overlay
  source: assets/linked/generated-files.json
  destination: /output/contracts/.contract-kit/generated-files.json
- type: overlay
  source: assets/overlays/non-utf8/raw.bin
  destination: /input/source/nested/lib.rs
- type: run
  argv:
  - conkit
  - generate
  - sketches
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        failed to resolve linked sketch source

        Caused by:
            allowlisted Rust source nested/lib.rs is not valid UTF-8: invalid utf-8 sequence of 1 bytes from index 0
- type: assert_tree
  actual: /output/contracts
  expected: output
  contents: text
