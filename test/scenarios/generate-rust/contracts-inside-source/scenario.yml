version: 1
coverage:
- behavior.generate.error.overlap.contracts-inside-source
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /input/source/contracts
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        source path /input/source overlaps contracts path /input/source/contracts
- type: assert_tree
  actual: /input/source
  expected: input/source
  contents: text
