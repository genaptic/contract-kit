version: 1
coverage:
- behavior.generate.linked-sketch.refresh
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --crate-root
  - scenario=library:nested/lib.rs
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        signature generation completed: documents 1, signatures 3, preserved sketches 0, semantically changed documents 1, byte-changed documents 1
    stderr:
      kind: empty
- type: overlay
  source: assets/linked/main.yml
  destination: /output/contracts/main.yml
- type: overlay
  source: assets/linked/generated-files.json
  destination: /output/contracts/.contract-kit/generated-files.json
- type: run
  argv:
  - conkit
  - generate
  - sketches
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        sketch generation completed: linked 1, refreshed 1, changed 1, changed documents 1
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output
  contents: text
