version: 1
coverage:
- behavior.generate.error.overlap.source-inside-contracts
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/contracts/source
  - --contracts
  - /input/contracts
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        source path /input/contracts/source overlaps contracts path /input/contracts
- type: assert_tree
  actual: /input/contracts
  expected: input/contracts
  contents: text
