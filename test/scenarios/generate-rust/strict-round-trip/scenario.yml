version: 1
coverage:
- behavior.generate.round-trip.strict-check
steps:
- type: run
  argv:
  - conkit
  - generate
  - all
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --crate-root
  - scenario=library:nested/lib.rs
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract generation completed: documents 1, signatures 5, preserved sketches 0, semantically changed documents 1, byte-changed documents 1; linked sketches 0, refreshed 0, changed 0, changed documents 0
    stderr:
      kind: empty
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --output
  - /output/report.yml
  - --strict
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract check passed: 5 signatures, 0 sketches
    stderr:
      kind: empty
- type: assert_tree
  actual: /output
  expected: output
  contents: text
