version: 1
coverage:
- behavior.generate.fresh.signatures
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  - --crate-root
  - scenario=library:nested/lib.rs
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        signature generation completed: documents 1, signatures 3, preserved sketches 0, semantically changed documents 1, byte-changed documents 1
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output
  contents: text
