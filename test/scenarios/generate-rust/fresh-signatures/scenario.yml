version: 1
coverage:
- behavior.generate.fresh.signatures
steps:
- type: run
  argv:
  - conkit
  - generate
  - signatures
  - --source
  - /input/source
  - --contracts
  - /output/contracts
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        generated 2 signature contracts
    stderr:
      kind: empty
- type: assert_tree
  actual: /output/contracts
  expected: output
  contents: text
