version: 1
coverage:
  - behavior.check.contract-extension.mixed-case
  - behavior.check.contracts.multiple-documents
steps:
  - type: run
    argv:
      - conkit
      - check
      - sketches
      - --source
      - /input/src
      - --contracts
      - /input/contracts
      - --output
      - /output/report.yml
      - --strict
    expect:
      exit_code: 0
      stdout:
        kind: exact
        value: |
          sketch check passed: matched 2, failed 0, total 2; referenced sources present 2/2; catalog entries 2; contract documents 2
      stderr: { kind: empty }
  - type: assert_tree
    actual: /output
    expected: output
    contents: text
