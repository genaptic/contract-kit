version: 1
coverage:
  - behavior.check.sketch.exact-lines-whitespace-mismatch
steps:
  - type: run
    argv:
      - conkit
      - check
      - sketches
      - --source
      - /input/src
      - --contracts
      - /input/contracts
      - --output
      - /output/report.yml
      - --strict
    expect:
      exit_code: 1
      stdout:
        kind: empty
      stderr:
        kind: exact
        value: |
          contract check failed for Sketches
  - type: assert_tree
    actual: /output
    expected: output
    contents: text
