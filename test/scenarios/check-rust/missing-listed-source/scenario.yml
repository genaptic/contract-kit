version: 1
coverage:
  - behavior.check.contracts.missing-listed-source
steps:
  - type: overlay
    source: output/sentinel.txt
    destination: /output/sentinel.txt
  - type: run
    argv:
      - conkit
      - check
      - sketches
      - --source
      - /input/src
      - --contracts
      - /input/contracts
      - --output
      - /output/report.yml
      - --strict
    expect:
      exit_code: 1
      stdout: { kind: empty }
      stderr:
        kind: contains_in_order
        value:
          - "listed source file is unavailable: /input/src/missing.rs"
          - "os error 2"
  - type: assert_tree
    actual: /output
    expected: output
    contents: text
