version: 1
coverage:
  - behavior.check.error.compiler-selection.requires-manifest
steps:
  - type: overlay
    source: output/sentinel.txt
    destination: /output/sentinel.txt
  - type: run
    argv:
      - conkit
      - check
      - signatures
      - --source
      - /input/missing-source
      - --contracts
      - /input/missing-contracts
      - --output
      - /output/report.yml
      - --signature-extractor
      - compiler
    expect:
      exit_code: 2
      stdout:
        kind: empty
      stderr:
        kind: exact
        value: |
          error: the following required arguments were not provided:
            --manifest-path <FILE>

          Usage: conkit check signatures --source <DIR> --contracts <DIR> --output <FILE> --signature-extractor <SIGNATURE_EXTRACTOR> --manifest-path <FILE>

          For more information, try '--help'.
  - type: assert_tree
    actual: /input
    expected: input
    contents: bytes
  - type: assert_tree
    actual: /output
    expected: output
    contents: bytes
