version: 1
coverage:
- behavior.check.matrix.all.warning.matching
steps:
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/report.yaml
  - --warning
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract check passed: 1 signatures, 1 sketches
    stderr:
      kind: empty
- type: assert_tree
  actual: /output
  expected: output
  contents: text
