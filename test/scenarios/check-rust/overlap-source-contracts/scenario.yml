version: 1
coverage:
- behavior.check.error.overlap.source-contracts
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/src
  - --contracts
  - /input/src
  - --output
  - /output/report.yml
  - --strict
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        source path /input/src overlaps contracts path /input/src
- type: assert_tree
  actual: /output
  expected: output
  contents: text
