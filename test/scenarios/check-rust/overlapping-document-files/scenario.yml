version: 1
coverage:
  - behavior.check.contracts.overlapping-files
steps:
  - type: overlay
    source: output/sentinel.txt
    destination: /output/sentinel.txt
  - type: run
    argv:
      - conkit
      - check
      - signatures
      - --source
      - /input/src
      - --contracts
      - /input/contracts
      - --output
      - /output/report.yml
      - --strict
    expect:
      exit_code: 0
      stdout:
        kind: exact
        value: |
          signature check passed: 2 source signatures, 2 contract signatures
      stderr: { kind: empty }
  - type: assert_tree
    actual: /output
    expected: output
    contents: text
