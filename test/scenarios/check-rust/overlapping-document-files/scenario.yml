version: 1
coverage:
  - behavior.check.contracts.overlapping-files
steps:
  - type: overlay
    source: output/sentinel.txt
    destination: /output/sentinel.txt
  - type: run
    argv:
      - conkit
      - check
      - sketches
      - --source
      - /input/src
      - --contracts
      - /input/contracts
      - --output
      - /output/report.yml
      - --strict
    expect:
      exit_code: 1
      stdout: { kind: empty }
      stderr:
        kind: exact
        value: |
          invalid contract layout /input/contracts/second.YAML: listed source path lib.rs overlaps lib.rs claimed by first.yml
  - type: assert_tree
    actual: /output
    expected: output
    contents: text
