version: 1
coverage:
  - behavior.check.sketch.whitespace-normalized
steps:
  - type: run
    argv:
      - conkit
      - check
      - sketches
      - --source
      - /input/src
      - --contracts
      - /input/contracts
      - --output
      - /output/report.yml
      - --strict
    expect:
      exit_code: 0
      stdout:
        kind: exact
        value: |
          sketch check passed: 1 matched sketches, 0 failed sketches
      stderr: { kind: empty }
  - type: assert_tree
    actual: /output
    expected: output
    contents: text
