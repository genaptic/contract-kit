version: 1
coverage:
- behavior.check.matrix.all.omitted.mismatching
- behavior.check.report.extension.yaml
steps:
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/report.yaml
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        contract check failed for All
- type: assert_tree
  actual: /output
  expected: output
  contents: text
