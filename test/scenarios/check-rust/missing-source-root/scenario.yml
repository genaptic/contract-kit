version: 1
coverage:
- behavior.check.error.source-root-missing
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/missing-source
  - --contracts
  - /input/contracts
  - --output
  - /output/report.yml
  - --strict
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        Source root is not a directory: /input/missing-source
- type: assert_tree
  actual: /output
  expected: output
  contents: text
