version: 1
cargo_workspace: true
coverage:
- surface.command.check
- surface.target.check.all
- surface.mode.check.strict
- surface.format.check.yaml
steps:
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/output.yml
  - --strict
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contract check passed: 25 signatures, 1 sketches
    stderr:
      kind: empty
- type: assert_tree
  actual: /output
  expected: output
  contents: text
