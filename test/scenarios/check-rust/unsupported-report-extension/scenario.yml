version: 1
coverage:
- behavior.check.error.report-extension-unsupported
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/report.txt
  - --strict
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        unsupported report extension for /output/report.txt; expected .yml, .yaml, or .json
- type: assert_tree
  actual: /output
  expected: output
  contents: text
