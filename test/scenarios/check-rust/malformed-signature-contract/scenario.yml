version: 1
coverage:
- behavior.check.error.signature-contract-malformed
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: overlay
  source: assets/overlays/malformed/main.yml
  destination: /input/contracts/main.yml
- type: run
  argv:
  - conkit
  - check
  - signatures
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/report.yml
  - --strict
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: contains_in_order
      value:
      - failed to check signature contracts
      - failed to parse main.yml document 0
      - not-a-named-signature
      - "unexpected event: expected mapping start"
- type: overlay
  source: assets/overlays/inapplicable-field/main.yml
  destination: /input/contracts/main.yml
- type: run
  argv:
  - conkit
  - check
  - signatures
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/report.yml
  - --strict
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: contains_in_order
      value:
      - failed to check signature contracts
      - failed to parse main.yml document 0
      - field fields is not allowed for signature_type function
- type: assert_tree
  actual: /output
  expected: output
  contents: text
