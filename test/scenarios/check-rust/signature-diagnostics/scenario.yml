version: 1
coverage:
- behavior.check.diagnostic.signature.extra
- behavior.check.diagnostic.signature.mismatched
- behavior.check.diagnostic.signature.missing
steps:
- type: run
  argv:
  - conkit
  - check
  - signatures
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/report.yml
  - --strict
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        contract check failed for Signatures
- type: assert_tree
  actual: /output
  expected: output
  contents: text
