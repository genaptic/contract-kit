contract_version: 2
root: ../src
files:
  - main.rs
  - foo.rs
  - bar.rs
  - foobar.rs
  - utils.rs
extraction: { mode: rust_syntax_v2, profile: rust_api_v1, crates: [{ id: app, root: main.rs, kind: binary }] }

signatures:
  - bar_module:
      file: main.rs
      signature_type: module
      name: bar
      visibility: private
  - foo_module:
      file: main.rs
      signature_type: module
      name: foo
      visibility: private
  - foobar_module:
      file: main.rs
      signature_type: module
      name: foobar
      visibility: private
  - utils_module:
      file: main.rs
      signature_type: module
      name: utils
      visibility: private
  - main:
      file: main.rs
      signature_type: function
      name: main
      visibility: private
      parameters: []
      sketch: main
  - foo_struct:
      file: foo.rs
      module_path: [foo]
      signature_type: struct
      name: FooStruct
      visibility: crate
      fields:
        foo: Foo
        int_field: i32
      implementations:
        - items:
            - signature_type: method
              name: new
              visibility: crate
              parameters:
                - { pattern: foo, type: Foo }
                - { pattern: int_field, type: i32 }
              return_type: Self
            - signature_type: method
              name: foo
              receiver: ref
              visibility: crate
              parameters: []
              return_type: "&Foo"
            - signature_type: method
              name: int_field
              receiver: ref
              visibility: crate
              parameters: []
              return_type: i32
            - signature_type: method
              name: total
              receiver: ref
              visibility: crate
              parameters: []
              return_type: i32
            - signature_type: method
              name: increment_foo
              receiver: mut
              visibility: crate
              parameters: []
            - signature_type: method
              name: describe
              receiver: ref
              visibility: crate
              parameters: []
              return_type: String
  - foo_enum:
      file: bar.rs
      module_path: [bar]
      signature_type: enum
      name: Foo
      visibility: crate
      variants:
        - Foo
        - Bar: [i32]
      implementations:
        - items:
            - signature_type: method
              name: new_foo
              visibility: crate
              parameters: []
              return_type: Self
            - signature_type: method
              name: new_bar
              visibility: crate
              parameters:
                - { pattern: value, type: i32 }
              return_type: Self
            - signature_type: method
              name: is_foo
              receiver: ref
              visibility: crate
              parameters: []
              return_type: bool
            - signature_type: method
              name: is_bar
              receiver: ref
              visibility: crate
              parameters: []
              return_type: bool
            - signature_type: method
              name: value
              receiver: ref
              visibility: crate
              parameters: []
              return_type: Option<i32>
            - signature_type: method
              name: increment
              receiver: ref
              visibility: crate
              parameters: []
              return_type: Self
            - signature_type: method
              name: reset
              receiver: ref
              visibility: crate
              parameters: []
              return_type: Self
            - signature_type: method
              name: describe
              receiver: ref
              visibility: crate
              parameters: []
              return_type: String
  - bar_enum:
      file: bar.rs
      module_path: [bar]
      signature_type: enum
      name: Bar
      visibility: public
      variants:
        - Foo
        - Bar: [i32]
      implementations:
        - items:
            - signature_type: method
              name: new_foo
              visibility: crate
              parameters: []
              return_type: Self
            - signature_type: method
              name: new_bar
              visibility: crate
              parameters:
                - { pattern: value, type: i32 }
              return_type: Self
            - signature_type: method
              name: value
              receiver: ref
              visibility: crate
              parameters: []
              return_type: Option<i32>
        - trait: Default
          items:
            - signature_type: method
              name: default
              parameters: []
              return_type: Self
        - trait: FooBar
          items:
            - signature_type: method
              name: is_foo
              receiver: ref
              parameters: []
              return_type: bool
            - signature_type: method
              name: is_bar
              receiver: ref
              parameters: []
              return_type: bool
            - signature_type: method
              name: describe
              receiver: ref
              parameters: []
              return_type: String
  - foobar_trait:
      file: foobar.rs
      module_path: [foobar]
      signature_type: trait
      name: FooBar
      visibility: public
      items:
        - signature_type: method
          name: is_foo
          receiver: ref
          parameters: []
          return_type: bool
        - signature_type: method
          name: is_bar
          receiver: ref
          parameters: []
          return_type: bool
        - signature_type: method
          name: describe
          receiver: ref
          parameters: []
          return_type: String
        - signature_type: method
          name: kind_label
          receiver: ref
          default_body: true
          parameters: []
          return_type: "&'static str"
  - parse_error_enum:
      file: utils.rs
      module_path: [utils]
      signature_type: enum
      name: ParseError
      visibility: crate
      variants: [Empty, Invalid, NotPositive]
  - sum_values_function:
      file: utils.rs
      module_path: [utils]
      signature_type: function
      name: sum_values
      visibility: crate
      parameters:
        - { pattern: values, type: "&[Foo]" }
      return_type: i32
  - first_bar_value_function:
      file: utils.rs
      module_path: [utils]
      signature_type: function
      name: first_bar_value
      visibility: crate
      parameters:
        - { pattern: values, type: "&[Foo]" }
      return_type: Option<i32>
  - parse_positive_function:
      file: utils.rs
      module_path: [utils]
      signature_type: function
      name: parse_positive
      visibility: crate
      parameters:
        - { pattern: input, type: "&str" }
      return_type: Result<i32, ParseError>
  - describe_foobar_function:
      file: utils.rs
      module_path: [utils]
      signature_type: function
      name: describe_foobar
      visibility: crate
      generics:
        - "T: FooBar"
      parameters:
        - { pattern: value, type: "&T" }
      return_type: String
sketches:
  - main:
      file: main.rs
      signature: main
      signature_type: function
      matching: { normalization: exact_lines_v1, occurrence: at_least_one }
      code: |
        fn main() {
            let foo = Foo::new_foo();
            let bar_value = Foo::new_bar(41).increment();
            let wrapped = FooStruct::new(bar_value, 1);

            assert!(foo.is_foo());
            assert!(!foo.is_bar());
            assert!(foo.reset().is_foo());
            assert_eq!(wrapped.total(), 43);
            assert_eq!(wrapped.foo().value(), Some(42));
            assert_eq!(wrapped.int_field(), 1);
            assert_eq!(wrapped.describe(), "FooStruct(foo=Bar(42), int_field=1)");

            let mut mutable_wrapped = FooStruct::new(Foo::new_bar(1), 2);
            mutable_wrapped.increment_foo();
            assert_eq!(mutable_wrapped.total(), 4);

            let trait_foo = Bar::new_foo();
            let trait_bar = Bar::new_bar(7);
            assert!(trait_foo.is_foo());
            assert_eq!(trait_foo.kind_label(), "foo");
            assert!(trait_bar.is_bar());
            assert_eq!(trait_bar.value(), Some(7));
            assert_eq!(trait_bar.describe(), "Bar(7)");
            assert_eq!(trait_bar.kind_label(), "bar");

            let values = [Foo::new_foo(), Foo::new_bar(3), Foo::new_bar(4)];
            assert_eq!(utils::sum_values(&values), 7);
            assert_eq!(utils::first_bar_value(&values), Some(3));
            assert!(matches!(utils::parse_positive("9"), Ok(9)));
            assert_eq!(utils::describe_foobar(&trait_bar), "bar: Bar(7)");
        }
