version: 1
cargo_workspace: true
coverage:
- behavior.check.alias.sketch
- surface.command.check
- surface.alias.check.sketch
- surface.mode.check.strict
- surface.format.check.yaml
steps:
- type: run
  argv:
  - conkit
  - check
  - sketch
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/output.yml
  - --strict
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        sketch check passed: matched 1, failed 0, total 1; referenced sources present 1/1; catalog entries 5; contract documents 1
    stderr:
      kind: empty
- type: assert_tree
  actual: /output
  expected: output
  contents: text
