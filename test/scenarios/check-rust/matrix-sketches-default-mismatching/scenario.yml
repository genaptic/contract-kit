version: 1
coverage:
- behavior.check.matrix.sketches.default.mismatching
steps:
- type: run
  argv:
  - conkit
  - check
  - sketches
  - --source
  - /input/src
  - --contracts
  - /input/contracts
  - --output
  - /output/report.JSON
  - --default
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        contract check failed for Sketches
- type: assert_tree
  actual: /output
  expected: output
  contents: text
