version: 1
coverage:
- behavior.diff.error.archive.not-file
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - /input/archive-directory
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: contains_in_order
      value:
      - failed to decode contract archive
      - 'archive path is not a regular file: /input/archive-directory'
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
