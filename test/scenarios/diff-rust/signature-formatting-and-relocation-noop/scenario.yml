version: 1
coverage:
- behavior.diff.noop.signature.formatting
- behavior.diff.noop.signature.relocation
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: remove
  path: /input/contracts/main.yml
- type: overlay
  source: assets/noop-signature/relocated.yaml
  destination: /input/contracts/relocated.yaml
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - /input/archives/mixed-v1.gzip
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contracts unchanged
    stderr:
      kind: empty
- type: remove
  path: /input/contracts/relocated.yaml
- type: overlay
  source: input/contracts/main.yml
  destination: /input/contracts/main.yml
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
