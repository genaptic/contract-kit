contract_version: 2
root: ../src
files:
  - lib.rs
extraction:
  mode: rust_syntax_v2
  profile: rust_api_v1
  crates:
    - id: fixture
      root: lib.rs
      kind: library
signatures:
  - added:
      file: lib.rs
      signature_type: function
      name: added
      visibility: public
      return_type: u8
      sketch: added_sketch
  - changed:
      file: lib.rs
      signature_type: function
      name: changed
      visibility: public
      return_type: u16
      sketch: changed_sketch
sketches:
  - added_sketch:
      file: lib.rs
      signature: added
      signature_type: function
      matching:
        normalization: exact_lines_v1
        occurrence: at_least_one
      code: |
        pub fn added() -> u8 {
            1
        }
  - changed_sketch:
      file: lib.rs
      signature: changed
      signature_type: function
      matching:
        normalization: exact_lines_v1
        occurrence: at_least_one
      code: |
        pub fn changed() -> u8 {
            2
        }
