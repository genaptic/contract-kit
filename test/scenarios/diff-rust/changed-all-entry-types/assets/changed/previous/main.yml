contract_version: 2
root: ../src
files:
  - lib.rs
extraction:
  mode: rust_syntax_v2
  profile: rust_api_v1
  crates:
    - id: fixture
      root: lib.rs
      kind: library
signatures:
  - changed:
      file: lib.rs
      signature_type: function
      name: changed
      visibility: public
      return_type: u8
      sketch: changed_sketch
  - removed:
      file: lib.rs
      signature_type: function
      name: removed
      visibility: public
      return_type: u8
      sketch: removed_sketch
sketches:
  - changed_sketch:
      file: lib.rs
      signature: changed
      signature_type: function
      matching:
        normalization: exact_lines_v1
        occurrence: at_least_one
      code: |
        pub fn changed() -> u8 {
            1
        }
  - removed_sketch:
      file: lib.rs
      signature: removed
      signature_type: function
      matching:
        normalization: exact_lines_v1
        occurrence: at_least_one
      code: |
        pub fn removed() -> u8 {
            1
        }
