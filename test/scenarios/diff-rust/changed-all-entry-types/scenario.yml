version: 1
coverage:
- behavior.diff.changed.exit-zero
- behavior.diff.entry.signature.added
- behavior.diff.entry.signature.changed
- behavior.diff.entry.signature.removed
- behavior.diff.entry.sketch.added
- behavior.diff.entry.sketch.changed
- behavior.diff.entry.sketch.removed
- behavior.diff.order.signatures-before-sketches
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - /input/archives/changed.gzip
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contracts changed
        signature added added
        signature changed changed
        signature removed removed
        sketch added added_sketch
        sketch changed changed_sketch
        sketch removed removed_sketch
    stderr:
      kind: empty
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
