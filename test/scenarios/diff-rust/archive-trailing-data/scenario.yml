version: 1
coverage:
  - behavior.diff.error.archive.trailing-data
steps:
  - type: overlay
    source: output/sentinel.txt
    destination: /output/sentinel.txt
  - type: run
    argv:
      - conkit
      - diff
      - --contracts
      - /input/contracts
      - --archive
      - /input/archives/trailing.gzip
    expect:
      exit_code: 1
      stdout: { kind: empty }
      stderr:
        kind: exact
        value: |
          failed to decode contract archive

          Caused by:
              failed to process archive: trailing.gzip: archive contains trailing data
  - type: assert_tree
    actual: /input
    expected: input
    contents: bytes
  - type: assert_tree
    actual: /output
    expected: output
    contents: bytes
