version: 1
coverage:
- behavior.diff.error.archived.signature-contract-malformed
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: overlay
  source: assets
  destination: /input/archives
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - /input/archives/malformed/archived-signature.gzip
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        archived contracts must be recreated in contract format v2

        Caused by:
            invalid contract layout main.yml: YAML document index 0 is invalid: error: line 12 column 13: unexpected event: expected sequence start
              --> <input>:12:13
               |
            10 |       root: lib.rs
            11 |       kind: library
            12 | signatures: not-a-list
               |             ^ unexpected event: expected sequence start
            13 | sketches: []
               |
- type: assert_tree
  actual: /input/archives
  expected: assets
  contents: bytes
- type: remove
  path: /input/archives
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
