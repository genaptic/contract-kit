contract_version: 2
root: ../src
files:
  - lib.rs
extraction:
  mode: rust_syntax_v2
  profile: rust_api_v1
  crates:
    - id: fixture
      root: lib.rs
      kind: library
signatures:
  - answer_signature:
      file: lib.rs
      signature_type: function
      name: answer
      visibility: public
      return_type: u8
      sketch: answer_body
sketches:
  - answer_body:
      file: lib.rs
      signature: answer_signature
      signature_type: function
      matching:
        normalization: exact_lines_v1
        occurrence: at_least_one
      code: ""
