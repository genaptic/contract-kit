version: 1
coverage:
- behavior.diff.error.current.signature-contract-malformed
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: overlay
  source: assets/malformed/main.yml
  destination: /input/contracts/main.yml
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - /input/archives/mixed-v1.gzip
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        failed to diff contracts

        Caused by:
            failed to parse main.yml: signatures: invalid type: string "not-a-list", expected a sequence at line 4 column 13
- type: overlay
  source: input/contracts/main.yml
  destination: /input/contracts/main.yml
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
