version: 1
coverage:
- behavior.diff.error.current.signature-contract-malformed
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: overlay
  source: assets/malformed/main.yml
  destination: /input/contracts/main.yml
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - /input/archives/mixed-v1.gzip
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        invalid contract layout main.yml: YAML document index 0 is invalid: error: line 12 column 13: unexpected event: expected sequence start
          --> <input>:12:13
           |
        10 |       root: lib.rs
        11 |       kind: library
        12 | signatures: not-a-list
           |             ^ unexpected event: expected sequence start
        13 | sketches: []
           |
- type: overlay
  source: input/contracts/main.yml
  destination: /input/contracts/main.yml
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
