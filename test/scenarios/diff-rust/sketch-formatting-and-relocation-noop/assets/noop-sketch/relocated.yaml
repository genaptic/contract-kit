# Document relocation, comments, YAML formatting, and snippet whitespace are semantic no-ops.
root: ../src
files: [lib.rs]
signatures:
  - answer_signature:
      sketch: answer_body
      return_type: u8
      visibility: public
      name: answer
      signature_type: function
      file: lib.rs
sketches:
  - answer_body:
    code: |-

      pub   fn   answer()  ->  u8  {   42 }

    signature_type: function
