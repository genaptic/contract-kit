# Document relocation, comments, and YAML scalar formatting are semantic no-ops.
contract_version: 2
root: ../src
files: [lib.rs]
extraction: {profile: rust_api_v1, mode: rust_syntax_v2, crates: [{root: lib.rs, kind: library, id: fixture}]}
signatures:
  - answer_signature:
      sketch: answer_body
      return_type: u8
      visibility: public
      name: answer
      signature_type: function
      file: lib.rs
sketches:
  - answer_body:
      code: "pub fn answer() -> u8 { 42 }\n"
      matching: {occurrence: at_least_one, normalization: exact_lines_v1}
      signature_type: function
      signature: answer_signature
      file: lib.rs
