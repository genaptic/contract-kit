version: 1
coverage:
- behavior.diff.unchanged
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - /input/archives/mixed-v1.gzip
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contracts unchanged
        signature contract digest v2 ad885c05e6ecb2a0b398f3448f2e6c70366f800b4b939a7b970207f7495f7720
        sketch contract digest v2 4b257a97426b34331950af21f4db9f6b0faf676fd38a2355e156d8131071b363
    stderr:
      kind: empty
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
