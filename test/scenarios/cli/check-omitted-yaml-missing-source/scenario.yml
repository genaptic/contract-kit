version: 1
coverage:
- surface.mode.check.omitted
- surface.format.check.yaml
steps:
- type: run
  argv:
  - conkit
  - check
  - all
  - --source
  - /input/missing
  - --contracts
  - /input/contracts
  - --output
  - /output/report.yml
  expect:
    exit_code: 1
    stdout:
      kind: empty
    stderr:
      kind: exact
      value: |
        Source root is not a directory: /input/missing
