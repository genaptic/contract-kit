version: 1
coverage:
- behavior.archive.catalog.mixed-family
- behavior.archive.destination.created
- behavior.archive.format.gzip.omitted
- behavior.archive.round-trip.diff
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - archive
  - --contracts
  - /input/contracts
  - --archive
  - /output/archives
  expect:
    exit_code: 0
    stdout:
      kind: contains_in_order
      value:
      - archived contracts to /output/archives/
      - |
        -archive.gzip
    stderr:
      kind: empty
- type: capture
  name: implicit
  directory: /output/archives
  selector:
    kind: only_file
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - ${capture.implicit}
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contracts unchanged
    stderr:
      kind: empty
- type: remove
  path: /output/archives
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
