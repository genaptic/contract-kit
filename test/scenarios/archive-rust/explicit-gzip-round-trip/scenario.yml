version: 1
coverage:
- behavior.archive.format.gzip.explicit
steps:
- type: overlay
  source: output/sentinel.txt
  destination: /output/sentinel.txt
- type: run
  argv:
  - conkit
  - archive
  - --contracts
  - /input/contracts
  - --archive
  - /output/archives
  - --gzip
  expect:
    exit_code: 0
    stdout:
      kind: contains_in_order
      value:
      - archived contracts to /output/archives/
      - |
        -archive.gzip
    stderr:
      kind: empty
- type: capture
  name: explicit
  directory: /output/archives
  selector:
    kind: only_file
- type: run
  argv:
  - conkit
  - diff
  - --contracts
  - /input/contracts
  - --archive
  - ${capture.explicit}
  expect:
    exit_code: 0
    stdout:
      kind: exact
      value: |
        contracts unchanged
        signature contract digest v2 ad885c05e6ecb2a0b398f3448f2e6c70366f800b4b939a7b970207f7495f7720
        sketch contract digest v2 4b257a97426b34331950af21f4db9f6b0faf676fd38a2355e156d8131071b363
    stderr:
      kind: empty
- type: remove
  path: /output/archives
- type: assert_tree
  actual: /input
  expected: input
  contents: bytes
- type: assert_tree
  actual: /output
  expected: output
  contents: bytes
